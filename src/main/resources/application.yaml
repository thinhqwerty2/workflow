spring:
  application:
    name: workflow
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        implicit-strategy: org.springframework.boot.hibernate.SpringImplicitNamingStrategy
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        default_schema: workflow
  datasource:
    url: jdbc:postgresql://localhost:5432/workflow?currentSchema=workflow
    username: workflow
    password: workflow
